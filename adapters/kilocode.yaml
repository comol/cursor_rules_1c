# Adapter: Kilo Code (VSCode extension)
#
# Describes how to copy and adapt files from content/ for Kilo Code.
# Read by both installation channels (AI-agent installer and install.ps1).
#
# Schema: see ARCHITECTURE.md §7 and §7.1 (closed operation set).
# Notes:
#   - Kilo Code distinguishes primary agents from subagents via a `mode` field:
#     `subagent` (only invoked via delegation) or `all` (both primary and subagent).
#     Source flag `isSubagent: true` maps to `mode: subagent`; otherwise `mode: all`.
#   - Slash-commands are stored as Kilo "workflows" in .kilocode/workflows/.
#   - Skills follow the Anthropic SKILL.md standard; Kilo Code discovers them
#     from .kilocode/skills/.
#   - MCP config uses the common `mcpServers` dictionary schema (same as
#     Cursor and Claude Code).
# Based on: https://kilo.ai/docs/customize/custom-subagents

tool: kilocode
schemaVersion: 3

detection:
  - exists: ".kilo/"

rules:
  copyTo: ".kilo/rules/{name}.md"
  frontmatter:
    keep: [description, alwaysApply]
    drop: [globs, category]

agents:
  copyTo: ".kilo/agents/{name}.md"
  
  frontmatter:
    keep: [description]
    
    # All 1C agents from content/agents/ are subagents (per AGENTS.md)
    add:
      mode: "subagent"
      temperature: 0.2
      steps: 15
      permission:
        task:
          "*": "deny"
          "general": "allow"
          "explore": "allow"
    
    # Map tools array to permission settings
    addIf:
      # If agent has Edit/Write tools -> allow editing
      "tools contains Edit OR tools contains Write":
        permission:
          edit: "allow"
      
      # If agent has Bash/Shell tools -> allow bash
      "tools contains Bash OR tools contains Shell":
        permission:
          bash: "allow"
      
      # If agent only has read tools -> deny edit/bash
      "tools contains Read AND !tools contains Edit AND !tools contains Write AND !tools contains Bash AND !tools contains Shell":
        permission:
          edit: "deny"
          bash: "deny"
      
      # Default permissions if no tools specified
      "tools is empty":
        permission:
          edit: "ask"
          bash: "ask"
      
      # Temperature and steps based on agent type
      "name contains analytic OR name contains architect":
        temperature: 0.3
        steps: 25
      
      "name contains developer OR name contains error-fixer OR name contains metadata-manager":
        temperature: 0.2
        steps: 20
      
      "name contains tester OR name contains doc OR name contains reviewer":
        temperature: 0.1
        steps: 15
    
    drop: [name, tools, modelHint, allowParallel, reasoningEffort]

commands:
  copyTo: ".kilo/workflows/{name}.md"
  frontmatter:
    keep: [description]
    drop: [argumentHint, allowedTools]

skills:
  copyTo: ".kilo/skills/{name}/"
  mode: verbatim

mcp:
  source: "content/mcp-servers.json"
  target: "kilo.jsonc"
  schema: mcp
  format: jsonc
